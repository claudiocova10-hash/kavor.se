<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" role="img" aria-labelledby="title desc">
  <title id="title">Kavor</title>
  <desc id="desc">Kavor-logotyp med rött K, vit och svart cirkel samt texten KAVOR.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0b0d0f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="110" cy="110" r="86" fill="#0b0d0f"/>
    <circle cx="110" cy="110" r="62" fill="#fff"/>
    <text x="110" y="141" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="92" font-weight="900" fill="#d22127">K</text>
  </g>
  <text x="225" y="143" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="98" font-weight="900" letter-spacing="6" fill="#111416">KAVOR</text>
</svg>
